<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroStocks - Prediction Results</title>
  <style>
    body {
      background-image: url(' images/images/bg.jpg'); 
    }
  </style>
  <link rel="stylesheet" href="css/result_page.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto&display=swap" rel="stylesheet">
</head>

<body>
  <header class="navbar">
    <div class="logo">AstroStocks</div>
    <nav class="nav-links">
      <a href="home.html">Home</a>
      <a href="form.html">Predict</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="about.html">About</a>
      <div id="authLink"></div>
    </nav>
  </header>

  <main>
    <section class="result-card">
      <h2>📊 Stock Prediction Summary</h2>
      <p><strong>Name:</strong> <span id="name"></span></p>
      <p><strong>Date of Birth:</strong> <span id="dob"></span></p>
      <p><strong>Stock:</strong> <span id="stock"></span></p>
      <p><strong>Prediction:</strong> <span id="prediction"></span></p>
      <p><strong>Confidence:</strong> <span id="confidence"></span></p>
    </section>

    <section class="horoscope">
      <h2>♐ Zodiac Insight</h2>
      <p><strong>Sign:</strong> <span id="zodiac"></span></p>
      <p id="zodiacInsight"></p>
    </section>

    <section class="planetary">
      <h2>🪐 Planetary Influences</h2>
      <ul id="planetaryList"></ul>
    </section>

    <section class="chart">
      <h2>📉 Stock Trend (Sample)</h2>
      <p><i>Comming Soon!!</i></p>
      <!-- <img src="images/chart-placeholder.png" alt="Sample Stock Chart" width="100%" /> -->
    </section>

    <section class="tips">
      <h2>💡 Expert Tip</h2>
      <p id="expertTip"></p>
    </section>

    <div class="actions">
      <button onclick="window.location.href='form.html'">🔁 Try Again</button>
      <button onclick="window.location.href='home.html'">🏠 Home</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 AstroStocks</p>
  </footer>

  <script src="js/stars.js"></script>
  <script src="js/result_page.js"></script>
</body>

</html>
