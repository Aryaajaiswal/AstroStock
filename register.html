<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Register | AstroStocks</title>
    <link rel="stylesheet" href="css\style.css" />
</head>

<body>
    <div id="navbar-container"></div>
    <script>
        loadNavbar();
    </script>
    <div class="container">
        <h2>📝 Register for AstroStocks</h2>
        <form id="registerForm">
            <input type="text" id="username" placeholder="Choose Username" required minlength="3" /><br />
            <input type="password" id="password" placeholder="Create Password" required minlength="6" /><br />
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6" /><br />
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
    <script>
        document.getElementById("registerForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            if (username.length < 3) {
                alert("Username must be at least 3 characters long.");
                return;
            }
            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }
            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }
            const users = JSON.parse(localStorage.getItem("users")) || [];
            if (users.some(user => user.username === username)) {
                alert("Username already exists.");
                return;
            }
            users.push({ username, password });
            localStorage.setItem("users", JSON.stringify(users));
            alert("Registration successful. Please log in.");
            window.location.href = "login.html";
        });
    </script>
</body>

</html>
