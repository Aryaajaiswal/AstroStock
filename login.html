<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Login | AstroStocks</title>
    <link rel="stylesheet" href="css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h2>🔐 Login to AstroStocks</h2>
        <form id="loginForm">
            <input type="text" id="username" class="form-input" placeholder="Enter Username" required autofocus
                minlength="3" /><br />
            <input type="password" id="password" class="form-input" placeholder="Enter Password" required
                minlength="6" /><br />
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="register.html">Register here</a></p>
        <button id="backHomeBtn" style="margin-top:1.2rem; background:linear-gradient(90deg,#4b2991 0%,#7c3aed 100%);
      color:#fff; border:none; border-radius:8px; padding:0.7rem 2rem; font-size:1rem; cursor:pointer;">
            🏠 Back to Home
        </button>
    </div>

    <script>
        document.getElementById("backHomeBtn").onclick = function () {
            window.location.href = "home.html";
        };

        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            if (username.length < 3) {
                alert("Username must be at least 3 characters long.");
                return;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            const users = JSON.parse(localStorage.getItem("users")) || [];

            const validUser = users.find(user =>
                user.username === username && user.password === password
            );

            if (validUser) {
                localStorage.setItem("loggedInUser", username);
                localStorage.setItem("isLoggedIn", "true"); // ✅ Fix added
                alert("✅ Login successful! Redirecting...");
                window.location.href = "dashboard.html";
            } else {
                alert("❌ Invalid credentials. Please try again.");
                document.getElementById("loginForm").reset();
            }
        });
    </script>
</body>

</html>
