<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstroStocks - Dashboard</title>
  <link rel="stylesheet" href="css\dashboard.css" />
</head>
<body>
  <header>
    <h1>📈 AstroStocks Dashboard</h1>
    <p>Track and manage your predictions and astrological insights</p>
  </header>

  <main>
    <section class="filter-section">
      <input type="text" id="filterInput" placeholder="🔍 Filter by Stock Name" />
    </section>

    <section class="predictions">
      <h2>🗂️ Prediction History</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Stock</th>
            <th>Prediction</th>
            <th>Confidence</th>
          </tr>
        </thead>
        <tbody id="predictionTable">
          <!-- JS will populate this -->
        </tbody>
      </table>
    </section>

    <section class="notes">
      <h2>📝 Your Investment Notes</h2>
      <textarea id="notes" placeholder="Write your thoughts here..."></textarea>
      <button onclick="saveNotes()">💾 Save Notes</button>
      <button id="clearNotesBtn">🧹 Clear Notes</button>
    </section>

    <section class="chart-visual">
      <h2>📊 Trends Overview</h2>
      <div id="chartPlaceholder"></div>
    </section>

    <div class="actions">
      <button onclick="window.location.href='form.html'">➕ New Prediction</button>
      <button onclick="window.location.href='home.html'">🏠 Home</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 AstroStocks</p>
  </footer>

  <script src="js\dshboard.js"></script>
</body>
</html>
