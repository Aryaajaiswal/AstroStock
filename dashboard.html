<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstroStocks - Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto&display=swap" rel="stylesheet">
</head>

<body>
  
  <header class="navbar">
    <div class="logo">🔮 AstroStocks</div>
    <nav class="nav-links">
      <a href="home.html">Home</a>
      <a href="form.html">Predict</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="about.html">About</a>
      <div id="authLink"></div>
    </nav>
  </header>

  <div class="dashboard-header">
    <p>Track and manage your predictions and astrological insights</p>
  </div>

  <main>
    <div id="dashboardContent">
      <section class="filter-section">
        <input type="text" id="filterInput" placeholder="🔍 Filter by Stock Name" />
      </section>

      <section class="predictions">
        <h2>🗂️ Prediction History</h2>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Stock</th>
              <th>Prediction</th>
              <th>Confidence</th>
            </tr>
          </thead>
          <tbody id="predictionTable">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </section>

      <section class="notes">
        <h2>📝 Your Investment Notes</h2>
        <textarea id="notes" placeholder="Write your thoughts here..."></textarea>
        <button onclick="saveNotes()">💾 Save Notes</button>
        <button id="clearNotesBtn">🧹 Clear Notes</button>
      </section>

      <section class="chart-visual">
        <h2>📊 Trends Overview</h2>
        <div id="chartPlaceholder"></div>
      </section>

      <div class="actions">
        <button onclick="window.location.href='form.html'">➕ New Prediction</button>
        <button onclick="window.location.href='home.html'">🏠 Home</button>
      </div>
    </div>

    <div id="loginRequiredMsg"
      style="display:none; text-align:center; color:#e57373; font-size:1.3rem; margin-top:2rem;">
      You must be logged in to access the dashboard.<br>
      <a href="login.html" style="color:#7c3aed; text-decoration:underline;">Go to Login</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 AstroStocks</p>
  </footer>

  
  <script src="js/dshboard.js"></script>
  <script>
    const loggedInUser = localStorage.getItem("loggedInUser");
    const dashContent = document.getElementById("dashboardContent");
    const msg = document.getElementById("loginRequiredMsg");
    const authLink = document.getElementById("authLink");

    // Show or hide dashboard based on login
    if (!loggedInUser) {
      dashContent.style.display = "none";
      msg.style.display = "block";
      authLink.innerHTML = '<a href="login.html">Login</a>';
    } else {
      dashContent.style.display = "block";
      msg.style.display = "none";
      authLink.innerHTML = '<a href="#" onclick="logout()">Logout</a>';
    }

    // Logout function
    function logout() {
      localStorage.removeItem("loggedInUser");
      localStorage.removeItem("predictionData");
      alert("Logged out successfully!");
      window.location.href = "login.html";
    }
  </script>
</body>

</html>
